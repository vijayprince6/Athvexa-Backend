# Supabase Database Configuration - Using Shared Pooler (IPv4 compatible)
# Added prepareThreshold=0 to disable prepared statement caching (fixes Supabase pooler issue)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=HikariCP-Athvexa
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration
server.port=${PORT:10000}

# JWT Configuration
jwt.secret=${JWT_SECRET:24!@#$%^&*()_+SportsPlatformJWT}
jwt.expiration=86400000

# Cloudinary Configuration
# Verified from user dashboard: dxst75r0s
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:dxst75r0s}
cloudinary.api_key=${CLOUDINARY_API_KEY:571284175968616}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:nlq-0bD7Ah76i_JuSaOxLuLT35c}
logging.level.com.cloudinary=DEBUG

# CORS Configuration
spring.web.cors.allowed-origins=https://athvexa-sports-portal.web.app,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.exposed-headers=*
spring.jpa.open-in-view=false